body:
  text: 凡天子建之以州邦君建之以都大夫建之以里士建之以室凡天子七世邦君五世大夫三世士二世士象大夫之位身不免大夫象邦君之位身不免邦君象天子之位身不免禮者義之兄也禮之於宗廟也不精為精不美為美義反之精為不精美為不美故亡禮大廢無義大孽行純用情邦喪純用物邦喪必中情以羅於物僟殺而邦正文陰而武陽信文得事士信武得田文德治武德伐文生武殺日月得其剌列根之以玉斗仇讎殘亡洛尹行身和二一喜一怒天子坐以矩食以義立以縣行以興繩視侯量顧還身諸侯食同狀視百正顧還肩與卿大夫同耻度士視目恆顧還面不可以不聞耻度民之儀也凡天子歆餼邦君食濁大夫承荐士受余天子四辟筵席邦君三辟大夫二辟士一辟事鬼則行敬懷民則以德斷刑則以哀朝不語內貢不語戰在道不語匿處政不語樂尊俎不制事聚衆不語怨男女不語辱朋友不語分臨食不語惡臨兆不言亂不言侵不言滅不言敗不言短故龜有五忌臨城不言毀觀邦不言喪故見禓而為之祈見窔而為之入
